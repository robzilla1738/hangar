name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    name: Build · Test · Lint
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest 16)
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/swiftlint
            /opt/homebrew/Cellar/xcbeautify
            /opt/homebrew/Cellar/swift-format
            /opt/homebrew/Cellar/xcodegen
          key: brew-${{ runner.os }}-v1

      - name: Install dev tools
        run: |
          brew install swiftlint xcbeautify swift-format xcodegen || true
          swiftlint version
          xcbeautify --version
          swift-format --version
          xcodegen --version

      - name: Download Metal toolchain (Xcode 26 split it out)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: SwiftLint
        run: swiftlint --strict

      - name: swift-format lint
        run: swift-format lint --recursive --strict Sources Tests Hangar

      - name: Resolve SPM
        run: swift package resolve

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -scheme Hangar \
            -destination 'platform=macOS' \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -scheme Hangar \
            -destination 'platform=macOS' \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify --renderer github-actions

      - name: Upload test result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: DerivedData/Logs/Test/*.xcresult
