name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build · Sign · Notarize · Publish
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APPLE_TEAM_ID: 9F2JXY8TCK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install tooling
        run: brew install xcodegen xcbeautify create-dmg

      - name: Import Developer ID certificate
        if: ${{ env.APPLE_DEVELOPER_ID_CERT_P12_BASE64 != '' }}
        env:
          APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash scripts/release/import-cert.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build, sign, notarize
        if: ${{ env.APPLE_DEVELOPER_ID_CERT_P12_BASE64 != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SPARKLE_ED_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_ED_PRIVATE_KEY_BASE64 }}
        run: |
          bash scripts/release/build-release.sh
          bash scripts/release/notarize.sh
          bash scripts/release/build-dmg.sh
          bash scripts/release/build-appcast.sh

      - name: Stub run (no secrets configured)
        if: ${{ env.APPLE_DEVELOPER_ID_CERT_P12_BASE64 == '' }}
        run: |
          echo "::warning::Release secrets not configured. Skipping signing/notarization."
          echo "See .github/secrets-checklist.md for the list of required secrets."
          exit 0

      - name: Create GitHub release
        if: ${{ env.APPLE_DEVELOPER_ID_CERT_P12_BASE64 != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            dist/Hangar-*.dmg \
            dist/appcast.xml \
            --title "Hangar $TAG" \
            --notes-file release-notes.md
